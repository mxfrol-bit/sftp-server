<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agro Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f1117; color: #e0e0e0; }
  .header { background: #1a1d2e; padding: 20px 30px; border-bottom: 1px solid #2a2d3e; display: flex; align-items: center; gap: 15px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .badge { background: #22c55e; color: #000; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .container { display: flex; height: calc(100vh - 65px); }
  .sidebar { width: 340px; background: #13151f; border-right: 1px solid #2a2d3e; overflow-y: auto; }
  .sidebar-header { padding: 15px 20px; border-bottom: 1px solid #2a2d3e; display: flex; justify-content: space-between; align-items: center; }
  .sidebar-header span { font-size: 13px; color: #888; }
  .btn-refresh { background: #2a2d3e; border: none; color: #e0e0e0; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .btn-refresh:hover { background: #3a3d4e; }
  .file-item { padding: 14px 20px; border-bottom: 1px solid #1e2030; cursor: pointer; transition: background 0.15s; }
  .file-item:hover { background: #1a1d2e; }
  .file-item.active { background: #1e3a5f; border-left: 3px solid #3b82f6; }
  .file-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; word-break: break-all; }
  .file-meta { font-size: 11px; color: #666; display: flex; gap: 10px; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar { padding: 15px 25px; background: #13151f; border-bottom: 1px solid #2a2d3e; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .toolbar span { font-size: 13px; color: #666; margin-right: 5px; }
  .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
  .btn-db { background: #7c3aed; color: white; }
  .btn-db:hover { background: #6d28d9; }
  .btn-site { background: #0891b2; color: white; }
  .btn-site:hover { background: #0e7490; }
  .btn-ai { background: #d97706; color: white; }
  .btn-ai:hover { background: #b45309; }
  .btn-delete { background: #dc2626; color: white; margin-left: auto; }
  .btn-delete:hover { background: #b91c1c; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .content { flex: 1; overflow-y: auto; padding: 25px; }
  .empty { text-align: center; color: #444; padding: 80px 20px; }
  .empty h2 { font-size: 18px; margin-bottom: 8px; }
  .json-viewer { background: #1a1d2e; border-radius: 8px; padding: 20px; font-family: monospace; font-size: 13px; line-height: 1.6; overflow-x: auto; white-space: pre-wrap; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #1a1d2e; border-radius: 8px; padding: 15px 20px; }
  .stat-label { font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; }
  .stat-value { font-size: 22px; font-weight: 700; }
  .log { background: #0d1117; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 12px; max-height: 150px; overflow-y: auto; margin-top: 15px; }
  .log-line { padding: 2px 0; }
  .log-ok { color: #22c55e; }
  .log-err { color: #ef4444; }
  .log-info { color: #888; }
  .api-key-input { background: #1a1d2e; border: 1px solid #2a2d3e; color: #e0e0e0; padding: 6px 10px; border-radius: 6px; font-size: 12px; width: 200px; }
</style>
</head>
<body>
<div class="header">
  <h1>🌾 Agro Admin</h1>
  <span class="badge">LIVE</span>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
    <span style="font-size:12px;color:#666;">API Key:</span>
    <input class="api-key-input" id="apiKey" type="password" value="agro_secret_2025">
  </div>
</div>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <span id="fileCount">Загрузка...</span>
      <button class="btn-refresh" onclick="loadFiles()">↻ Обновить</button>
    </div>
    <div id="fileList"><div style="padding:20px;color:#444;">Загрузка...</div></div>
  </div>
  <div class="main">
    <div class="toolbar">
      <span>Действия:</span>
      <button class="btn btn-db" id="btnDb" disabled onclick="saveToDb()">💾 Сохранить в БД</button>
      <button class="btn btn-site" id="btnSite" disabled onclick="sendToSite()">🌐 На сайт</button>
      <button class="btn btn-ai" id="btnAi" disabled onclick="analyzeAi()">🤖 Анализ AI → Бот</button>
      <button class="btn btn-delete" id="btnDelete" disabled onclick="deleteFile()">🗑 Удалить</button>
    </div>
    <div class="content" id="mainContent">
      <div class="empty"><h2>Выберите файл</h2><p>Выберите файл из списка слева</p></div>
    </div>
  </div>
</div>
<script>
let selectedFile = null;
let filesData = [];

function apiKey() { return document.getElementById('apiKey').value; }

function log(msg, type='info') {
  const el = document.getElementById('logArea');
  if (!el) return;
  const line = document.createElement('div');
  line.className = `log-line log-${type}`;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function loadFiles() {
  try {
    const res = await fetch('/files', { headers: { 'x-api-key': apiKey() } });
    filesData = await res.json();
    document.getElementById('fileCount').textContent = `Файлов: ${filesData.length}`;
    const list = document.getElementById('fileList');
    if (!filesData.length) {
      list.innerHTML = '<div style="padding:20px;color:#444;text-align:center;">Файлов нет. Ожидаем выгрузку из 1С...</div>';
      return;
    }
    list.innerHTML = filesData.map(f => `
      <div class="file-item ${selectedFile===f.name?'active':''}" onclick="selectFile('${f.name}')">
        <div class="file-name">${f.name}</div>
        <div class="file-meta"><span>${f.created}</span><span>${(f.size/1024).toFixed(1)} KB</span></div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('fileCount').textContent = 'Ошибка';
  }
}

async function selectFile(name) {
  selectedFile = name;
  loadFiles();
  ['btnDb','btnSite','btnAi','btnDelete'].forEach(id => document.getElementById(id).disabled = false);
  document.getElementById('mainContent').innerHTML = '<div class="empty"><p>Загрузка...</p></div>';
  try {
    const res = await fetch(`/files/${name}`, { headers: { 'x-api-key': apiKey() } });
    const data = await res.json();
    const fi = filesData.find(f => f.name === name);
    const stats = Array.isArray(data.orders) ? `
      <div class="stats">
        <div class="stat-card"><div class="stat-label">Заказов</div><div class="stat-value">${data.orders.length}</div></div>
        <div class="stat-card"><div class="stat-label">Сумма</div><div class="stat-value">${data.summary?.total_amount?.toLocaleString('ru') || '—'} ₽</div></div>
        <div class="stat-card"><div class="stat-label">Размер</div><div class="stat-value">${(fi.size/1024).toFixed(1)} KB</div></div>
        <div class="stat-card"><div class="stat-label">Загружен</div><div class="stat-value" style="font-size:14px">${fi.created}</div></div>
      </div>` : '';
    document.getElementById('mainContent').innerHTML = `
      ${stats}
      <div class="json-viewer">${JSON.stringify(data, null, 2)}</div>
      <div class="log" id="logArea"><div class="log-line log-info">Файл открыт: ${name}</div></div>`;
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div class="empty"><p>Ошибка загрузки</p></div>';
  }
}

async function saveToDb() {
  if (!selectedFile) return;
  log('Сохранение в БД...', 'info');
  try {
    const res = await fetch(`/save-to-db/${selectedFile}`, {
      method: 'POST',
      headers: { 'x-api-key': apiKey() }
    });
    const data = await res.json();
    if (data.status === 'ok') {
      log(`✅ Сохранено записей: ${data.saved}`, 'ok');
    } else {
      log(`❌ Ошибка: ${JSON.stringify(data)}`, 'err');
    }
  } catch(e) {
    log(`❌ Ошибка: ${e}`, 'err');
  }
}

async function sendToSite() {
  log('⚠️ Сайт — скоро будет подключён', 'err');
}

async function analyzeAi() {
  log('⚠️ AI анализ — скоро будет подключён', 'err');
}

async function deleteFile() {
  if (!confirm(`Удалить ${selectedFile}?`)) return;
  await fetch(`/files/${selectedFile}`, { method: 'DELETE', headers: { 'x-api-key': apiKey() } });
  log(`Удалён: ${selectedFile}`, 'ok');
  selectedFile = null;
  ['btnDb','btnSite','btnAi','btnDelete'].forEach(id => document.getElementById(id).disabled = true);
  document.getElementById('mainContent').innerHTML = '<div class="empty"><h2>Выберите файл</h2></div>';
  loadFiles();
}

loadFiles();
setInterval(loadFiles, 30000);
</script>
</body>
</html>
